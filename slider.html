<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider</title>
    <style>
        /* Added slider styles here */
        .slider-container{
            position: relative;
            width: 600px;
            overflow: hidden;
            border-radius: 10px;
        }

        .slides{
            display: flex;
            transition: transform 0.4s ease;
        }

        .slide{
            min-width: 100%;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
        }

        .slide:nth-child(1){
            background: #e74c3c;
        }
        .slide:nth-child(2){
            background: #3498db;
        }
        .slide:nth-child(3){
            background: #2ecc71;
        }
        .slide:nth-child(4){
            background: #f39c12;
        }

        .btn-prev,.btn-next{
            position: absolute;
            top: 50%;
            translate: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 1.2rem;
            border-radius: 4px;
        }

        .btn-prev{
            left: 10px;
        }

        .btn-next {
            right: 10px;
        }

        .dot{
            display: inline-block;
            width: 10px;
            height: 10px;
            margin: 0 5px;
            background:#ccc;
            cursor: pointer;
            transition: background 0.3s;
        }

        .dot.active{
            background: #333;
        }
    </style>
</head>
<body>
    <div class="slider-container">
        <div class="slides" id="slides">
            <div class="slide">Slide 1</div>
            <div class="slide">Slide 2</div>
            <div class="slide">Slide 3</div>
            <div class="slide">Slide 4</div>
        </div>
        <button class="btn-prev" onclick="changeSlide(-1)">&#10094;</button>
        <button class="btn-next" onclick="changeSlide(1)">&#10095;</button>
    </div>

    <div class="dots" id="dots"></div>

    <script>
        let curr = 0;
        const slides = document.getElementById('slides');
        const totalSlides = slides.children.length;
        const dotContainer = document.getElementById('dots');

        // Created dots
        for(let i =0; i<totalSlides; i++){
            const dot = document.createElement('span');
            dot.classList.add('dot');
            if(i===0) dot.classList.add('active');
            dot.addEventListener('click', () => goTo(i));
            dotContainer.appendChild(dot);
        }

        function updateDots(){
            document.querySelectorAll('.dot').forEach((d, i) => {
               d.classList.toggle('active', i === curr);
            });
        }

        function goTo(index) {
           curr = (index + totalSlides) % totalSlides;
           slides.style.transform = `translateX(-${curr * 100}%)`;
           updateDots();
        }

        function changeSlide(dir) {
          goTo(curr + dir);
        }

        // auto play
        setInterval (() => changeSlide(1), 3000);
    </script>
</body>
</html>
